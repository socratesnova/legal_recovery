version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: lr_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-legal_recovery}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-legal_recovery_dev_2024}
      POSTGRES_DB: ${POSTGRES_DB:-legal_recovery}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-legal_recovery} -d ${POSTGRES_DB:-legal_recovery}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - legal_recovery

  redis:
    image: redis:7-alpine
    container_name: lr_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - legal_recovery

  minio:
    image: minio/minio:latest
    container_name: lr_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - legal_recovery

  api-migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: production
    container_name: lr_api_migrate
    restart: "no"
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-legal_recovery}:${POSTGRES_PASSWORD:-legal_recovery_dev_2024}@postgres:5432/${POSTGRES_DB:-legal_recovery}}
    command: ["sh", "-c", "cd /app/apps/api && npx prisma migrate deploy && npx prisma generate"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - legal_recovery

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: lr_api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-legal_recovery}:${POSTGRES_PASSWORD:-legal_recovery_dev_2024}@postgres:5432/${POSTGRES_DB:-legal_recovery}}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JWT_SECRET: ${JWT_SECRET:-local-jwt-secret-key-for-development-only-32chars}
      PORT: ${API_PORT:-3001}
      API_URL: ${API_URL:-http://localhost:3001}
      WEB_URL: ${WEB_URL:-http://localhost:3000}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin123}
      MINIO_BUCKET: ${MINIO_BUCKET:-legal-recovery}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
    ports:
      - "${API_PORT:-3001}:${API_PORT:-3001}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      api-migrate:
        condition: service_completed_successfully
    networks:
      - legal_recovery

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: lr_web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      PORT: ${WEB_PORT:-3000}
    ports:
      - "${WEB_PORT:-3000}:${WEB_PORT:-3000}"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - legal_recovery

volumes:
  postgres_data:
  minio_data:

networks:
  legal_recovery:
    driver: bridge
