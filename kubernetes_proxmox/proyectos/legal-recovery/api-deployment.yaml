apiVersion: apps/v1
kind: Deployment
metadata:
  name: legal-recovery-api
  namespace: legal-recovery
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: legal-recovery-api
  template:
    metadata:
      labels:
        app: legal-recovery-api
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: api
          image: ghcr.io/socratesnova/legal_recovery/api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
          envFrom:
            - configMapRef:
                name: legal-recovery-config
            - secretRef:
                name: legal-recovery-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/v1/auth/healthz
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/v1/auth/healthz
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 5
