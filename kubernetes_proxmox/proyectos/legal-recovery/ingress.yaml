apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: legal-recovery
  namespace: legal-recovery
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - legal-recovery.licitpilot.com
      secretName: legal-recovery-tls
  rules:
    - host: legal-recovery.licitpilot.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: legal-recovery-api
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: legal-recovery-web
                port:
                  number: 80
