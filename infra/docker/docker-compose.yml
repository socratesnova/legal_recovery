version: "3.8"

services:
  # PostgreSQL 16 - Base de datos principal
  postgres:
    image: postgres:16-alpine
    container_name: lr_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: legal_recovery
      POSTGRES_PASSWORD: legal_recovery_dev_2024
      POSTGRES_DB: legal_recovery
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./pg_hba.conf:/etc/postgresql/pg_hba.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U legal_recovery -d legal_recovery"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis - Cache + Colas
  redis:
    image: redis:7-alpine
    container_name: lr_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO - Almacenamiento S3-compatible
  minio:
    image: minio/minio:latest
    container_name: lr_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # Keycloak - Autenticacion y autorizacion
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: lr_keycloak
    restart: unless-stopped
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:***@postgres:5432/legal_recovery
      KC_DB_USERNAME: legal_recovery
      KC_DB_PASSWORD: legal_recovery_dev_2024
      KC_HOSTNAME: localhost
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin123
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  # Backend NestJS API
  api:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile.dev
    container_name: lr_api
    restart: unless-stopped
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://legal_recovery:***@postgres:5432/legal_recovery?schema=public
      REDIS_URL: redis://redis:6379
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: legal-recovery
      KEYCLOAK_CLIENT_ID: legal-recovery-api
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-change-me}
      JWT_SECRET: ${JWT_SECRET:-legal-recovery-jwt-secret-2026-change-in-production}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      MINIO_BUCKET: legal-recovery
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_started
    volumes:
      - ../../apps/api:/app
      - /app/node_modules
    command: npm run start:dev

  # Frontend Next.js (desarrollo)
  web:
    build:
      context: ../../apps/web
      dockerfile: Dockerfile.dev
    container_name: lr_web
    restart: unless-stopped
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_KEYCLOAK_URL: http://localhost:8080
      NEXT_PUBLIC_KEYCLOAK_REALM: legal-recovery
      NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: legal-recovery-web
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_started
    volumes:
      - ../../apps/web:/app
      - /app/node_modules
    command: npm run dev

  # Metabase - BI dashboards
  metabase:
    image: metabase/metabase:latest
    container_name: lr_metabase
    restart: unless-stopped
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT: 5432
      MB_DB_USER: legal_recovery
      MB_DB_PASS: legal_recovery_dev_2024
      MB_DB_HOST: postgres
    ports:
      - "3002:3000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  keycloak_data:
  redis_data:
  minio_data:
